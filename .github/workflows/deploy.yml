name: "Build and Deploy Django App"

on:
  push:
    paths:
      - "app/**"
      - ".github/workflows/deploy.yml"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      AZURE_RG: rg-final-project
      ACR_NAME: williamfinalacr
      ACR_LOGIN_SERVER: williamfinalacr.azurecr.io
      CONTAINER_NAME: django-app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure CLI Login
        run: |
          az login --service-principal \
            --username "${{ secrets.AZURE_CLIENT_ID }}" \
            --password "${{ secrets.AZURE_CLIENT_SECRET }}" \
            --tenant "${{ secrets.AZURE_TENANT_ID }}"
          az account set --subscription "${{ secrets.AZURE_SUBSCRIPTION_ID }}"

      - name: Build and Push Docker image
        run: |
          az acr login --name "$ACR_NAME"
          IMAGE_TAG="${{ github.sha }}"
          docker build -t "$ACR_LOGIN_SERVER/django-app:$IMAGE_TAG" ./app
          docker push "$ACR_LOGIN_SERVER/django-app:$IMAGE_TAG"

      - name: Deploy to Azure Container Instance
        run: |
          az acr update --name "$ACR_NAME" --admin-enabled true
          REGISTRY_USERNAME=$(az acr credential show --name "$ACR_NAME" --query username --output tsv)
          REGISTRY_PASSWORD=$(az acr credential show --name "$ACR_NAME" --query "passwords[0].value" --output tsv)

          az container delete \
            --resource-group "$AZURE_RG" \
            --name "$CONTAINER_NAME" \
            --yes || true

          az container create \
            --resource-group "$AZURE_RG" \
            --name "$CONTAINER_NAME" \
            --image "$ACR_LOGIN_SERVER/django-app:${{ github.sha }}" \
            --cpu 1 \
            --memory 2 \
            --registry-login-server "$ACR_LOGIN_SERVER" \
            --registry-username "$REGISTRY_USERNAME" \
            --registry-password "$REGISTRY_PASSWORD" \
            --dns-name-label william-django-app-${{ github.run_number }} \
            --ports 8000 \
            --environment-variables \
              DJANGO_SECRET_KEY="${{ secrets.DJANGO_SECRET_KEY }}" \
              DATABASE_NAME="${{ secrets.DATABASE_NAME }}" \
              DATABASE_USER="${{ secrets.DATABASE_USER }}" \
              DATABASE_PASSWORD="${{ secrets.DATABASE_PASSWORD }}" \
              DATABASE_HOST="${{ secrets.DATABASE_HOST }}"

      - name: Show app URL
        run: |
          echo "App URL:"
          az container show \
            --resource-group "$AZURE_RG" \
            --name "$CONTAINER_NAME" \
            --query ipAddress.fqdn \
            --output tsv
